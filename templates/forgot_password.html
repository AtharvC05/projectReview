<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Recovery - Project Review System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .recovery-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .recovery-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .recovery-header h1 {
            color: #2c3e50;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .recovery-header p {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #495057;
            font-weight: 600;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .security-questions {
            margin-bottom: 1rem;
        }

        .question-group {
            background: rgba(248, 249, 250, 0.8);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .question-group h4 {
            color: #495057;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .btn {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.2);
            color: #721c24;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.2);
            color: #155724;
        }

        .back-to-login {
            text-align: center;
            margin-top: 1rem;
        }

        .back-to-login a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .back-to-login a:hover {
            color: #764ba2;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e9ecef;
            border-radius: 2px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        @media (max-width: 480px) {
            .recovery-container {
                padding: 1.5rem;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="recovery-container">
        <div class="recovery-header">
            <h1>🔐 Password Recovery</h1>
            <p>Recover your account using security questions</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 33%;"></div>
        </div>

        <div id="alert" class="alert"></div>

        <!-- Step 1: Username -->
        <div id="step1" class="step active">
            <h3>Step 1: Enter Username</h3>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <button id="nextStep1" class="btn btn-primary">Next</button>
        </div>

        <!-- Step 2: Security Questions -->
        <div id="step2" class="step">
            <h3>Step 2: Answer Security Questions</h3>
            <p>Please answer at least 3 security questions correctly.</p>
            <div id="securityQuestions" class="security-questions">
                <!-- Questions will be populated here -->
            </div>
            <button id="backStep2" class="btn btn-secondary">Back</button>
            <button id="nextStep2" class="btn btn-primary">Verify Answers</button>
        </div>

        <!-- Step 3: New Password -->
        <div id="step3" class="step">
            <h3>Step 3: Set New Password</h3>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" required minlength="6">
            </div>
            <button id="backStep3" class="btn btn-secondary">Back</button>
            <button id="resetPassword" class="btn btn-primary">Reset Password</button>
        </div>

        <div class="back-to-login">
            <a href="/auth/login">← Back to Login</a>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let userId = null;
        let securityQuestions = [];

        const alert = document.getElementById('alert');
        const progressFill = document.getElementById('progressFill');

        function showAlert(message, type = 'error') {
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
        }

        function hideAlert() {
            alert.style.display = 'none';
        }

        function showStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');
            
            const progress = (step / 3) * 100;
            progressFill.style.width = `${progress}%`;
            
            currentStep = step;
        }

        function setLoading(button, loading) {
            button.disabled = loading;
            button.textContent = loading ? 'Loading...' : button.dataset.originalText || button.textContent;
        }

        // Step 1: Get security questions
        document.getElementById('nextStep1').addEventListener('click', async function() {
            const username = document.getElementById('username').value.trim();
            
            if (!username) {
                showAlert('Please enter your username');
                return;
            }

            this.dataset.originalText = this.textContent;
            setLoading(this, true);
            hideAlert();

            try {
                const response = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    userId = data.user_id;
                    securityQuestions = data.questions;
                    populateSecurityQuestions();
                    showStep(2);
                } else {
                    showAlert(data.error || 'Failed to retrieve security questions');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Network error. Please try again.');
            } finally {
                setLoading(this, false);
            }
        });

        function populateSecurityQuestions() {
            const container = document.getElementById('securityQuestions');
            container.innerHTML = '';

            securityQuestions.forEach((q, index) => {
                const questionGroup = document.createElement('div');
                questionGroup.className = 'question-group';
                questionGroup.innerHTML = `
                    <h4>Question ${index + 1}:</h4>
                    <p style="margin-bottom: 0.5rem; color: #6c757d;">${q.question}</p>
                    <input type="text" id="answer${q.id}" placeholder="Your answer..." required>
                `;
                container.appendChild(questionGroup);
            });
        }

        // Step 2: Verify security answers
        document.getElementById('nextStep2').addEventListener('click', async function() {
            const answers = [];
            let filledAnswers = 0;

            securityQuestions.forEach(q => {
                const answer = document.getElementById(`answer${q.id}`).value.trim();
                if (answer) {
                    answers.push({ question_id: q.id, answer });
                    filledAnswers++;
                }
            });

            if (filledAnswers < 3) {
                showAlert('Please answer at least 3 security questions');
                return;
            }

            this.dataset.originalText = this.textContent;
            setLoading(this, true);
            hideAlert();

            try {
                const response = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_id: userId, 
                        answers,
                        new_password: 'temp_password_will_be_replaced'
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showStep(3);
                } else {
                    showAlert(data.error || 'Security answers verification failed');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Network error. Please try again.');
            } finally {
                setLoading(this, false);
            }
        });

        // Step 3: Reset password
        document.getElementById('resetPassword').addEventListener('click', async function() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword.length < 6) {
                showAlert('Password must be at least 6 characters long');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match');
                return;
            }

            const answers = [];
            securityQuestions.forEach(q => {
                const answer = document.getElementById(`answer${q.id}`).value.trim();
                if (answer) {
                    answers.push({ question_id: q.id, answer });
                }
            });

            this.dataset.originalText = this.textContent;
            setLoading(this, true);
            hideAlert();

            try {
                const response = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_id: userId, 
                        answers,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showAlert('Password reset successfully! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/auth/login';
                    }, 2000);
                } else {
                    showAlert(data.error || 'Password reset failed');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Network error. Please try again.');
            } finally {
                setLoading(this, false);
            }
        });

        // Back buttons
        document.getElementById('backStep2').addEventListener('click', () => showStep(1));
        document.getElementById('backStep3').addEventListener('click', () => showStep(2));

        // Clear alerts on input
        document.addEventListener('input', () => hideAlert());
    </script>
</body>
</html>
