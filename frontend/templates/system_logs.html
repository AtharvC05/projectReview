<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Activity Logs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            min-height: 100vh;
            background: #0f172a;
            color: #f8fafc;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #1e293b;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }
        .header h1 {
            font-size: 22px;
            color: #38bdf8;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary { background: #475569; color: white; }
        .btn-secondary:hover { background: #334155; }
        
        .controls-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
        }
        .search-box {
            flex: 1;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 14px;
            outline: none;
        }
        .search-box:focus {
            border-color: #38bdf8;
        }
        
        .logs-container {
            background: #090d16;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 15px;
            height: calc(100vh - 180px);
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        .log-row {
            padding: 4px 8px;
            border-bottom: 1px solid #131c2e;
            display: flex;
            gap: 12px;
            word-break: break-all;
        }
        .log-row:hover {
            background: #131d31;
        }
        .log-time { color: #64748b; min-width: 150px; }
        .log-level { font-weight: bold; min-width: 70px; text-transform: uppercase; }
        .log-level.INFO { color: #38bdf8; }
        .log-level.WARNING { color: #fbbf24; }
        .log-level.ERROR { color: #f87171; }
        .log-name { color: #c084fc; min-width: 160px; }
        .log-msg { color: #e2e8f0; flex: 1; }
        
        .badge {
            background: #334155;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 System Activity Logs</h1>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="fetchLogs()">🔄 Refresh Logs</button>
                <a href="/data-manager" class="btn btn-secondary">⬅️ Back to Data Manager</a>
            </div>
        </div>
        
        <div class="controls-bar">
            <input type="text" id="filter-input" class="search-box" placeholder="🔍 Search logs by keyword (e.g. error, import, BIA-01, schedule)..." oninput="filterLogs()">
            <span class="badge" id="log-count">0 logs</span>
        </div>
        
        <div class="logs-container" id="logs-list">
            <div style="color: #64748b; text-align: center; padding: 40px;">Loading live system logs...</div>
        </div>
    </div>

    <script>
        let allLogs = [];

        async function fetchLogs() {
            try {
                const res = await fetch('/api/admin/logs');
                const data = await res.json();
                if (data.success) {
                    allLogs = data.logs || [];
                    renderLogs(allLogs);
                }
            } catch (err) {
                console.error("Failed to fetch logs:", err);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('logs-list');
            document.getElementById('log-count').innerText = `${logs.length} log entries`;
            
            if (logs.length === 0) {
                container.innerHTML = '<div style="color: #64748b; text-align: center; padding: 40px;">No logs recorded yet.</div>';
                return;
            }

            container.innerHTML = logs.slice().reverse().map(log => `
                <div class="log-row">
                    <span class="log-time">${log.timestamp || ''}</span>
                    <span class="log-level ${log.level}">${log.level}</span>
                    <span class="log-name">${log.name || ''}</span>
                    <span class="log-msg">${escapeHtml(log.message || '')}</span>
                </div>
            `).join('');
        }

        function filterLogs() {
            const query = document.getElementById('filter-input').value.toLowerCase();
            if (!query) {
                renderLogs(allLogs);
                return;
            }
            const filtered = allLogs.filter(l => 
                (l.message && l.message.toLowerCase().includes(query)) ||
                (l.name && l.name.toLowerCase().includes(query)) ||
                (l.level && l.level.toLowerCase().includes(query))
            );
            renderLogs(filtered);
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // Fetch logs on load and auto-refresh every 5 seconds
        fetchLogs();
        setInterval(fetchLogs, 5000);
    </script>
</body>
</html>
